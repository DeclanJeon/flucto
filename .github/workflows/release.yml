name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semantic Release (Dry Run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: prepare
    if: needs.prepare.outputs.new_release_published == 'true'
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install Dependencies
        run: npm install

      - name: Setup Binaries
        run: npm run postinstall

      - name: Update Version
        shell: bash
        run: |
          npm version ${{ needs.prepare.outputs.new_release_version }} --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run dist -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Windows bundled binaries
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $yt = "release/win-unpacked/resources/bin/yt-dlp.exe"
          $ff = "release/win-unpacked/resources/bin/ffmpeg.exe"
          $winston = "release/win-unpacked/resources/app/node_modules/winston/package.json"
          if (!(Test-Path $yt)) { throw "Missing binary: $yt" }
          if (!(Test-Path $ff)) { throw "Missing binary: $ff" }
          if (!(Test-Path $winston)) { throw "Missing runtime dependency: $winston" }
          & $yt --version | Out-Null
          & $ff -version | Out-Null
          Write-Host "Windows binaries verified"

      - name: Verify macOS bundled binaries
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          test -f "release/mac/Flucto.app/Contents/Resources/bin/yt-dlp"
          test -f "release/mac/Flucto.app/Contents/Resources/bin/ffmpeg"
          test -f "release/mac/Flucto.app/Contents/Resources/app/node_modules/winston/package.json"
          "release/mac/Flucto.app/Contents/Resources/bin/yt-dlp" --version >/dev/null
          "release/mac/Flucto.app/Contents/Resources/bin/ffmpeg" -version >/dev/null

      - name: Verify Linux bundled binaries
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          test -f "release/linux-unpacked/resources/bin/yt-dlp"
          test -f "release/linux-unpacked/resources/bin/ffmpeg"
          test -f "release/linux-unpacked/resources/app/node_modules/winston/package.json"
          "release/linux-unpacked/resources/bin/yt-dlp" --version >/dev/null
          "release/linux-unpacked/resources/bin/ffmpeg" -version >/dev/null

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          retention-days: 1

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-windows-latest
          path: release

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-macos-latest
          path: release

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-ubuntu-latest
          path: release

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_CREDENTIALS: ${{ secrets.GITHUB_TOKEN }}
