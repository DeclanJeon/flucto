name: Build & Release

# 'v'로 시작하는 태그가 푸시될 때만 작동 (예: v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 3가지 OS에서 병렬로 빌드
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      # 1. 의존성 설치 (이 과정에서 postinstall 스크립트가 실행되어 바이너리가 다운로드됨)
      - name: Install Dependencies
        run: npm ci

      # 2. React(Renderer) & Electron(Main) 빌드
      - name: Build Code
        run: npm run build

      # 3. Electron Builder 실행 (패키징 및 배포)
      - name: Build & Release Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true # GitHub Release 생성 및 업로드 활성화
          # macOS Code Signing 무시 (MVP용, 실제 배포시 인증서 필요)
          mac_certs: ''
          win_certs: ''
        env:
          # macOS에서 서명되지 않은 앱 빌드 허용
          CSC_IDENTITY_AUTO_DISCOVERY: false
